version: '3.8'

services:
  bot:
    build: .
    container_name: fap-discord-bot
    restart: unless-stopped
    environment:
      - DISCORD_TOKEN=${DISCORD_TOKEN}
      - FAP_USERNAME=${FAP_USERNAME}
      - FAP_PASSWORD=${FAP_PASSWORD}
      - FAP_STUDENT_ID=${FAP_STUDENT_ID}
      - FAP_CAMPUS=${FAP_CAMPUS:-4}
      - ENCRYPTION_KEY=${ENCRYPTION_KEY}
      - FLARESOLVERR_URL=http://flaresolverr:8191/v1
      - PREFER_FLARESOLVERR_REFRESH=${PREFER_FLARESOLVERR_REFRESH:-true}
      - FLARESOLVERR_MAX_TIMEOUT_MS=${FLARESOLVERR_MAX_TIMEOUT_MS:-180000}
      - FLARESOLVERR_WAIT_SECONDS=${FLARESOLVERR_WAIT_SECONDS:-5}
      - FLARESOLVERR_REQUEST_TIMEOUT_SECONDS=${FLARESOLVERR_REQUEST_TIMEOUT_SECONDS:-240}
      - DATABASE_PATH=data/fap.db
      - LOG_LEVEL=${LOG_LEVEL:-INFO}
      - SCHEDULER_TIMEZONE=${SCHEDULER_TIMEZONE:-Asia/Ho_Chi_Minh}
      - DEFAULT_CHANNEL_ID=${DEFAULT_CHANNEL_ID}
      - HEADLESS=false
      - PROXY_URL=${PROXY_URL}
    volumes:
      - ./data:/app/data
      - ./logs:/app/logs
    depends_on:
      - flaresolverr
    networks:
      - bot-network

  flaresolverr:
    image: flaresolverr/flaresolverr:latest
    container_name: flaresolverr
    restart: unless-stopped
    ports:
      - "8191:8191"
    environment:
      - LOG_LEVEL=${LOG_LEVEL:-info}
      - HEADLESS=false
      - DISPLAY=:99
      - PROXY_URL=${PROXY_URL}
    entrypoint: ["/bin/sh", "-c", "Xvfb :99 -screen 0 1280x720x24 & sleep 1 && /usr/bin/dumb-init -- /usr/local/bin/python -u /app/flaresolverr.py"]
    networks:
      - bot-network

networks:
  bot-network:
    driver: bridge
